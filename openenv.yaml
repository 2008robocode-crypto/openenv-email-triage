name: customer_support_triage

description: >
  A reinforcement-learning environment simulating customer support ticket triage.
  Agents must filter spam, prioritize urgent tickets, and correctly handle VIP escalation workflows.

version: 1.0

entry_point: core:CustomerSupportEnv

tasks:
  - name: easy
    description: Resolve spam tickets correctly

  - name: medium
    description: Prioritize and resolve high urgency tickets first

  - name: hard
    description: Escalate VIP tickets before closing

action_space:
  type: object
  properties:
    ticket_id:
      type: integer
    action:
      type: string
      enum: ["reply", "close", "escalate", "mark_spam"]

observation_space:
  type: object
  properties:
    inbox:
      type: array
    step_count:
      type: integer
    task_mode:
      type: string

reward_range: [-20, 20]

max_steps: 20